policy_name: "default_us_privacy"
version: 0.1

rules:
  - rule_id: "PRIV-DATA-001"
    title: Missing AI input data classification
    description: AI integrations must declare the types of data sent to models before deployment.
    check: missing_data_classification_check
    severity: medium
    enforcement: warn
    params: {}
    recommendations:
      - Declare data_types in the AI integration configuration
      - Classify whether personal or sensitive data may be sent to the model
      - Require privacy review if sensitive data is involved

  - rule_id: "PRIV-SENS-001"
    title: Sensitive data sent to third-party AI provider
    description: High-risk sensitive data should not be sent to third-party AI providers without mitigation.
    check: sensitive_data_check
    severity: high
    enforcement: block
    params:
      provider_types:
        third_party:
          - openai
          - anthropic
          - google
          - cohere
          - mistral
          - bedrock
      high_risk_data_types:
        - health_info
        - financial_info
        - ssn
        - child_data
        - biometric_data
        - government_id
      sensitive_data_types:
        - health_info
        - financial_info
        - ssn
        - precise_location
        - child_data
        - biometric_data
        - government_id
        - race_ethnicity
        - sexual_orientation
        - religious_belief
    recommendations:
      - Apply redaction or tokenization before sending data to the model
      - Use an approved internal deployment or documented exception
      - Require privacy review before production release
