name: default_us_privacy
version: 1
description: >
  Baseline US privacy policy pack focused on developer-declared data types
  and third-party model providers.
rules:
  - rule_id: US.SENSITIVE.THIRD_PARTY.HIGH_RISK
    title: High-risk sensitive data shared with third-party provider
    description: >
      Triggers when developer-declared high-risk sensitive data types are
      sent to a known third-party model provider.
    check: sensitive_data_check
    severity: high
    enforcement: block
    recommendations:
      - Avoid sending high-risk sensitive data to third-party model providers.
      - Replace direct identifiers with redacted or tokenized values.
      - Route this use case through an approved self-hosted or isolated path.
    enabled: true
