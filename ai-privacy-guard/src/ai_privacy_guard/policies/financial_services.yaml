name: financial_services
description: Stricter policy profile for finance and regulated workloads.
allowed_regions:
  - us-east-1
  - us-west-2
sensitive_data_types:
  - ssn
  - payment_card
  - bank_account
  - tax_id
trusted_providers:
  - azure_openai
  - openai
high_risk_use_cases:
  - credit_underwriting
  - fraud_decisioning
  - investment_advice
required_metadata_fields:
  - provider
  - model
  - deployment_region
  - use_case
weights:
  pii_in_prompt_sample: 20
  sensitive_data: 25
  third_party_transfer: 20
  retention_risk: 15
  region_policy_mismatch: 10
  missing_metadata: 10
